site_name: DuoPilot v2.0
site_description: 双车协同循迹系统 — NUAA 天目启航

use_directory_urls: false

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Dark mode
  features:
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.share

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - 项目概览: index.md
  - 软件架构: architecture.md
  - 驱动模块: drivers.md
  - 控制算法: control.md
  - 引脚映射: pinout.md
  - 调试与使用: debug.md
